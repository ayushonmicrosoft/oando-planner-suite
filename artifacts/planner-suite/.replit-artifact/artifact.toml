kind = "web"
previewPath = "/"
title = "Office Planner Suite"
version = "1.0.0"
id = "artifacts/planner-suite"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24140

[services.development]
run = "pnpm --filter @workspace/planner-suite run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/planner-suite", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["node", "artifacts/planner-suite/.next/standalone/artifacts/planner-suite/server.js"]

[services.production.run.env]
PORT = "24140"
NODE_ENV = "production"
HOSTNAME = "0.0.0.0"

[services.production.health.startup]
path = "/"

[services.env]
PORT = "24140"
BASE_PATH = "/"
